<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f1923" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Traslados" />
  <title>Traslados Aeropuerto</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #0f1923;
      --bg2:       #162030;
      --bg3:       #1e2d3d;
      --accent:    #00d4ff;
      --accent2:   #ff9f1c;
      --ok:        #00e676;
      --warn:      #ffb300;
      --danger:    #ff1744;
      --text:      #e8f4f8;
      --muted:     #6b8fa8;
      --border:    #1e3a4a;
      --card:      #162030;
      --radius:    12px;
      --font-head: 'Rajdhani', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { max-width: 100%; overflow-x: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,25,35,.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #0080aa);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    header h1 {
      font-size: 1.1rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; line-height: 1.1;
    }
    header h1 span { color: var(--accent); }
    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: .7rem; font-family: var(--font-mono); color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      transition: background .3s;
    }
    .dot.online  { background: var(--ok);   box-shadow: 0 0 8px var(--ok); }
    .dot.offline { background: var(--danger); }

    main {
      position: relative; z-index: 1;
      max-width: 640px; margin: 0 auto;
      padding: 16px 16px 100px;
      width: 100%;
    }
    @media (max-width: 420px) {
      main { padding: 14px 10px 100px; }
      .stats { gap: 6px; }
    }

    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 10px;
      text-align: center;
      animation: fadeUp .4s ease both;
    }
    .stat-card:nth-child(2) { animation-delay: .05s; }
    .stat-card:nth-child(3) { animation-delay: .1s; }
    .stat-num {
      font-size: 1.7rem; font-weight: 700;
      color: var(--accent); line-height: 1;
    }
    .stat-label {
      font-size: .62rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-top: 4px;
    }

    .tabs {
      display: flex; gap: 4px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px; margin-bottom: 16px;
    }
    .tab {
      flex: 1; padding: 8px 2px;
      background: none; border: none; color: var(--muted);
      font-family: var(--font-head); font-size: .7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .3px;
      border-radius: 8px; cursor: pointer;
      transition: all .2s;
    }
    .tab.active { background: var(--accent); color: var(--bg); }

    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-wrap input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono); font-size: .85rem;
      padding: 10px 10px 10px 38px;
      outline: none; transition: border-color .2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap::before {
      content: '🔍';
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: .85rem;
    }

    /* ── Trip list ── */
    .trip-list { display: flex; flex-direction: column; gap: 8px; }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .icon { font-size: 2.6rem; margin-bottom: 10px; }

    .trip-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--muted);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: all .2s;
      animation: fadeUp .3s ease both;
    }
    .trip-card:active { transform: scale(.98); }
    .trip-card.hoy      { border-left-color: var(--danger); }
    .trip-card.pronto   { border-left-color: var(--warn); }
    .trip-card.normal   { border-left-color: var(--ok); }
    .trip-card.cancelado{ border-left-color: var(--muted); opacity: .55; }
    .trip-card.completado{ border-left-color: var(--muted); opacity: .7; }

    .trip-icon {
      width: 40px; height: 40px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; flex-shrink: 0;
      background: var(--bg3);
    }
    .trip-info { flex: 1; min-width: 0; }
    .trip-pax {
      font-size: .98rem; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .trip-ruta {
      font-family: var(--font-mono); font-size: .68rem;
      color: var(--muted); letter-spacing: .3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .trip-vuelo {
      font-family: var(--font-mono); font-size: .68rem;
      color: var(--accent2); margin-top: 2px;
    }
    .trip-fecha {
      font-family: var(--font-mono); font-size: .72rem;
      font-weight: 500; text-align: right; flex-shrink: 0;
    }
    .trip-fecha .dia  { color: var(--accent); font-size: .95rem; font-weight: 700; }
    .trip-fecha .hora { color: var(--muted); font-size: .68rem; }
    .badge {
      font-size: .58rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .5px;
      margin-top: 3px; display: inline-block;
    }
    .badge.hoy       { background: rgba(255,23,68,.15); color: var(--danger); }
    .badge.pronto    { background: rgba(255,179,0,.15);  color: var(--warn); }
    .badge.normal    { background: rgba(0,230,118,.15);  color: var(--ok); }
    .badge.cancelado { background: rgba(107,143,168,.15); color: var(--muted); }
    .badge.completado{ background: rgba(107,143,168,.15); color: var(--muted); }

    /* ── Calendar ── */
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-header button {
      background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      width: 36px; height: 36px; border-radius: 8px; font-size: 1rem; cursor: pointer;
      flex-shrink: 0;
    }
    .cal-title { font-size: 1.1rem; font-weight: 700; text-transform: capitalize; }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 3px; margin-bottom: 18px; width: 100%;
    }
    .cal-dow {
      text-align: center; font-size: .55rem; color: var(--muted);
      text-transform: uppercase; padding-bottom: 4px; font-family: var(--font-mono);
      overflow: hidden;
    }
    .cal-day {
      aspect-ratio: 1; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; display: flex; flex-direction: column; align-items: center;
      justify-content: center; cursor: pointer; position: relative; font-size: .75rem;
      transition: all .15s; min-width: 0; padding: 2px;
    }
    .cal-day.empty { background: none; border: none; cursor: default; }
    .cal-day.today { border-color: var(--accent); }
    .cal-day.selected { background: var(--accent); color: var(--bg); font-weight: 700; }
    .cal-day .n { font-weight: 600; }
    .cal-day .dots { display: flex; gap: 2px; margin-top: 2px; }
    .cal-day .dots span { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
    .cal-day.selected .dots span { background: var(--bg); }
    .cal-daylist-title {
      font-size: .8rem; color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 10px; font-family: var(--font-mono);
    }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: 20px; z-index: 90;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #0080aa);
      border: none; color: var(--bg); font-size: 1.6rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 4px 20px rgba(0,212,255,.4);
      transition: transform .15s;
    }
    .fab:active { transform: scale(.92); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(5,10,15,.7);
      backdrop-filter: blur(4px); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 18px 18px 0 0; width: 100%; max-width: 640px;
      max-height: 88vh; overflow-y: auto; padding: 22px 20px 30px;
      transform: translateY(30px); transition: transform .25s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title {
      font-size: 1.2rem; font-weight: 700; margin-bottom: 18px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title button {
      background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: .68rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
      font-family: var(--font-mono);
    }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--font-head);
      font-size: .95rem; padding: 10px 12px; outline: none; transition: border-color .2s;
    }
    .field textarea { resize: vertical; min-height: 60px; font-family: var(--font-head); }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-row { display: flex; gap: 10px; margin-top: 20px; }
    .btn {
      flex: 1; padding: 13px; border-radius: 10px; border: none;
      font-family: var(--font-head); font-weight: 700; font-size: .9rem;
      text-transform: uppercase; letter-spacing: .5px; cursor: pointer;
      transition: opacity .15s;
    }
    .btn:active { opacity: .8; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-danger  { background: rgba(255,23,68,.15); color: var(--danger); }
    .btn-ghost   { background: var(--bg3); color: var(--text); }
    .btn-warn    { background: rgba(255,179,0,.15); color: var(--warn); }

    /* ── Passenger picker ── */
    .pax-chips {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px;
    }
    .pax-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--bg3); border: 1px solid var(--accent);
      border-radius: 20px; padding: 5px 6px 5px 12px;
      font-size: .82rem; font-weight: 600;
    }
    .pax-chip button {
      background: none; border: none; color: var(--muted); font-size: .95rem;
      cursor: pointer; width: 18px; height: 18px; line-height: 1;
    }
    .pax-search { position: relative; }
    .pax-suggestions {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
      max-height: 180px; overflow-y: auto; z-index: 10;
      display: none;
    }
    .pax-suggestions.show { display: block; }
    .pax-sugg-item {
      padding: 10px 12px; font-size: .85rem; cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .pax-sugg-item:last-child { border-bottom: none; }
    .pax-sugg-item:active { background: var(--bg2); }
    .pax-sugg-item .tel { color: var(--muted); font-size: .72rem; font-family: var(--font-mono); }
    .pax-sugg-new {
      padding: 10px 12px; font-size: .85rem; color: var(--accent); font-weight: 600; cursor: pointer;
    }
    .pax-sugg-new:active { background: var(--bg2); }

    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .88rem;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row span:first-child { color: var(--muted); font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; }
    .detail-row span:last-child { font-weight: 600; text-align: right; max-width: 60%; }

    .config-section {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
    }
    .config-section h3 { font-size: .85rem; margin-bottom: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; }
    .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: .85rem; color: var(--muted); }
    .info-row span:last-child { color: var(--text); }

    /* ── Passenger cards ── */
    .pax-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
      cursor: pointer; transition: all .2s; animation: fadeUp .3s ease both;
    }
    .pax-card:active { transform: scale(.98); }
    .pax-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), #0080aa);
      color: var(--bg); display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1rem;
    }
    .pax-card-info { flex: 1; min-width: 0; }
    .pax-card-name { font-size: .95rem; font-weight: 700; }
    .pax-card-meta { font-family: var(--font-mono); font-size: .7rem; color: var(--muted); margin-top: 2px; }
    .pax-card-trips { font-size: .65rem; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }

    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 20px; font-size: .85rem; z-index: 300; opacity: 0; pointer-events: none;
      transition: all .3s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--ok); }
    .toast.error { border-color: var(--danger); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">✈️</div>
  <h1>Traslados<br><span>Aeropuerto · Hotel · Empresa</span></h1>
  <div class="status-dot">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">conectando…</span>
  </div>
</header>

<main>
  <div class="stats" id="statsBox"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('proximos', this)">Próximos</button>
    <button class="tab" onclick="switchTab('calendario', this)">Calendario</button>
    <button class="tab" onclick="switchTab('todos', this)">Todos</button>
    <button class="tab" onclick="switchTab('pasajeros', this)">Pasajeros</button>
    <button class="tab" onclick="switchTab('config', this)">⚙️</button>
  </div>

  <div class="search-wrap" id="searchWrap">
    <input type="text" id="searchInput" placeholder="Buscar por pasajero, vuelo, destino…" oninput="renderTab()" />
  </div>

  <div id="mainContent"></div>
</main>

<button class="fab" id="fabBtn">+</button>

<!-- Modal: formulario -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-title">
      <span id="formTitle">Nuevo Traslado</span>
      <button onclick="cerrarModal('formModal')">✕</button>
    </div>

    <div class="field">
      <label>Pasajero(s)</label>
      <div class="pax-chips" id="paxChips"></div>
      <div class="pax-search">
        <input type="text" id="inputPaxSearch" placeholder="Buscar o agregar pasajero…" autocomplete="off" oninput="buscarPasajeros(this.value)" onfocus="buscarPasajeros(this.value)" />
        <div class="pax-suggestions" id="paxSuggestions"></div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Tipo de traslado</label>
        <select id="inputTipo">
          <option value="aeropuerto-hotel">Aeropuerto → Hotel</option>
          <option value="aeropuerto-empresa">Aeropuerto → Empresa</option>
          <option value="hotel-aeropuerto">Hotel → Aeropuerto</option>
          <option value="empresa-aeropuerto">Empresa → Aeropuerto</option>
          <option value="hotel-empresa">Hotel → Empresa</option>
          <option value="empresa-hotel">Empresa → Hotel</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div class="field">
        <label>N° de vuelo (opcional)</label>
        <input type="text" id="inputVuelo" placeholder="Ej: AA1234" />
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Fecha</label>
        <input type="date" id="inputFecha" />
      </div>
      <div class="field">
        <label>Hora</label>
        <div style="display:flex; gap:6px;">
          <select id="inputHoraH" style="flex:1;"></select>
          <select id="inputHoraM" style="flex:1;"></select>
          <select id="inputHoraAP" style="flex:1;">
            <option value="AM">AM</option>
            <option value="PM">PM</option>
          </select>
        </div>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Origen</label>
        <input type="text" id="inputOrigen" placeholder="Ej: Aeropuerto SJO" />
      </div>
      <div class="field">
        <label>Destino</label>
        <input type="text" id="inputDestino" placeholder="Ej: Hotel Presidente" />
      </div>
    </div>

    <div class="field">
      <label>Notas (opcional)</label>
      <textarea id="inputNotas" placeholder="Ej: hotel de conexión, número de personas, contacto, equipaje especial…"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cerrarModal('formModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarTraslado()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: detalle -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-title">
      <span>Detalle del traslado</span>
      <button onclick="cerrarModal('detailModal')">✕</button>
    </div>
    <div id="detailBody"></div>
    <div class="btn-row" id="detailStatusRow"></div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="eliminarTraslado()">Eliminar</button>
      <button class="btn btn-primary" onclick="editarTraslado()">Editar</button>
    </div>
  </div>
</div>

<!-- Modal: perfil de pasajero -->
<div class="modal-overlay" id="paxModal">
  <div class="modal">
    <div class="modal-title">
      <span id="paxFormTitle">Nuevo Pasajero</span>
      <button onclick="cerrarModal('paxModal')">✕</button>
    </div>

    <div class="field">
      <label>Nombre completo</label>
      <input type="text" id="inputPaxNombre" placeholder="Ej: Juan Pérez" />
    </div>

    <div class="field">
      <label>Número de celular (opcional)</label>
      <input type="tel" id="inputPaxTelefono" placeholder="Ej: +506 8888 8888" />
    </div>

    <div class="field">
      <label>País de origen (opcional)</label>
      <input type="text" id="inputPaxPais" placeholder="Ej: Estados Unidos" />
    </div>

    <div class="field">
      <label>Notas (opcional)</label>
      <textarea id="inputPaxNotas" placeholder="Ej: alergias, preferencias, empresa a la que pertenece…"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cerrarModal('paxModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarPasajeroPerfil()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: detalle de pasajero -->
<div class="modal-overlay" id="paxDetailModal">
  <div class="modal">
    <div class="modal-title">
      <span>Perfil del pasajero</span>
      <button onclick="cerrarModal('paxDetailModal')">✕</button>
    </div>
    <div id="paxDetailBody"></div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="paxWhatsappBtn" style="background:rgba(0,230,118,.15);color:var(--ok);display:none;">📱 Abrir WhatsApp</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="eliminarPasajeroPerfil()">Eliminar</button>
      <button class="btn btn-primary" onclick="editarPasajeroPerfil()">Editar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInAnonymously,
           onAuthStateChanged }                      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs,
           doc, setDoc, deleteDoc, addDoc, updateDoc,
           onSnapshot }                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── 🔧 CONFIGURACIÓN — reemplaza con los datos de TU proyecto de Firebase ──
  const firebaseConfig = {
    apiKey:            "AIzaSyAhmrEro_SvD0P8MIdKGo7r6u2jiNG3Zpo",
    authDomain:        "calendariotrabajothh.firebaseapp.com",
    projectId:         "calendariotrabajothh",
    storageBucket:     "calendariotrabajothh.firebasestorage.app",
    messagingSenderId: "331773103488",
    appId:             "1:331773103488:web:7f15dff36f9069f8948565"
  };
  // ─────────────────────────────────────────────────────────────────────────

  const app  = initializeApp(firebaseConfig);
  const db   = getFirestore(app);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (!user) { signInAnonymously(auth).catch(e => { console.error(e); setStatus(false); }); }
  });

  const TIPOS = {
    'aeropuerto-hotel':   { label: 'Aeropuerto → Hotel',   icon: '🏨' },
    'aeropuerto-empresa': { label: 'Aeropuerto → Empresa', icon: '🏢' },
    'hotel-aeropuerto':   { label: 'Hotel → Aeropuerto',   icon: '✈️' },
    'empresa-aeropuerto': { label: 'Empresa → Aeropuerto', icon: '✈️' },
    'hotel-empresa':      { label: 'Hotel → Empresa',      icon: '🏢' },
    'empresa-hotel':      { label: 'Empresa → Hotel',      icon: '🏨' },
    'otro':               { label: 'Otro',                 icon: '🚐' }
  };
  const DOW = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MESES_L = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  let traslados   = {};   // id -> data
  let pasajerosDB  = {};  // id -> {nombre, telefono, pais}
  let selectedPax  = [];  // ids de pasajeros elegidos en el formulario actual
  let tabActual    = 'proximos';
  let idActual     = null;
  let modoEdicion  = false;
  let calMes, calAnio, diaSeleccionado = null;
  { const h = new Date(); calMes = h.getMonth(); calAnio = h.getFullYear(); }

  // ── Realtime listeners ───────────────────────────────────────────────────
  onSnapshot(collection(db, "traslados"), snap => {
    traslados = {};
    snap.forEach(d => traslados[d.id] = d.data());
    setStatus(true);
    renderTab();
  }, err => {
    setStatus(false);
    console.error(err);
  });

  onSnapshot(collection(db, "pasajeros"), snap => {
    pasajerosDB = {};
    snap.forEach(d => pasajerosDB[d.id] = d.data());
    renderTab();
  }, err => console.error(err));

  function setStatus(online) {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    dot.className  = 'dot ' + (online ? 'online' : 'offline');
    text.textContent = online ? 'en línea' : 'sin conexión';
  }

  // ── Helpers de fecha ─────────────────────────────────────────────────────
  function hoyISO() {
    const h = new Date();
    return `${h.getFullYear()}-${String(h.getMonth()+1).padStart(2,'0')}-${String(h.getDate()).padStart(2,'0')}`;
  }
  function diffDias(fechaISO) {
    const [y,m,d] = fechaISO.split('-').map(Number);
    const f = new Date(y, m-1, d);
    const h = new Date(); h.setHours(0,0,0,0);
    return Math.round((f - h) / 86400000);
  }
  function urgency(t) {
    if (t.estado === 'cancelado' || t.estado === 'completado') return t.estado;
    const dd = diffDias(t.fecha);
    if (dd <= 0) return 'hoy';
    if (dd <= 2) return 'pronto';
    return 'normal';
  }
  function badgeText(u) {
    return { hoy:'Hoy', pronto:'Pronto', normal:'Programado', cancelado:'Cancelado', completado:'Completado' }[u];
  }
  function fmtFechaCorta(fechaISO) {
    const [y,m,d] = fechaISO.split('-').map(Number);
    return { dia: String(d).padStart(2,'0'), mes: MESES_L[m-1].slice(0,3).toUpperCase() };
  }

  // ── Hora 12h AM/PM ↔ 24h "HH:MM" ────────────────────────────────────────
  function fmtHora12(hora24) {
    if (!hora24) return '';
    let [h,m] = hora24.split(':').map(Number);
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if (h === 0) h = 12;
    return `${h}:${String(m).padStart(2,'0')} ${ap}`;
  }
  function poblarSelectsHora() {
    const selH = document.getElementById('inputHoraH');
    const selM = document.getElementById('inputHoraM');
    if (selH.options.length === 0) {
      for (let h=1; h<=12; h++) selH.innerHTML += `<option value="${h}">${h}</option>`;
      for (let m=0; m<60; m+=5) selM.innerHTML += `<option value="${m}">${String(m).padStart(2,'0')}</option>`;
    }
  }
  function setHoraSelects(hora24) {
    poblarSelectsHora();
    let h = 12, m = 0, ap = 'AM';
    if (hora24) {
      const [hh,mm] = hora24.split(':').map(Number);
      ap = hh >= 12 ? 'PM' : 'AM';
      h = hh % 12; if (h === 0) h = 12;
      m = mm;
    }
    document.getElementById('inputHoraH').value = h;
    // Si el minuto exacto no está en la lista (múltiplos de 5), se agrega temporalmente
    const selM = document.getElementById('inputHoraM');
    if (![...selM.options].some(o => Number(o.value) === m)) {
      selM.innerHTML += `<option value="${m}">${String(m).padStart(2,'0')}</option>`;
    }
    selM.value = m;
    document.getElementById('inputHoraAP').value = ap;
  }
  function getHora24DesdeSelects() {
    let h = Number(document.getElementById('inputHoraH').value);
    const m = Number(document.getElementById('inputHoraM').value);
    const ap = document.getElementById('inputHoraAP').value;
    if (ap === 'AM') { if (h === 12) h = 0; } else { if (h !== 12) h += 12; }
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  // ── Render principal ─────────────────────────────────────────────────────
  function renderTab() {
    document.getElementById('fabBtn').style.display = tab_visible(tabActual);
    document.getElementById('searchWrap').style.display = (tabActual==='config') ? 'none' : '';
    document.getElementById('searchInput').placeholder = (tabActual==='pasajeros')
      ? 'Buscar por nombre o teléfono…' : 'Buscar por pasajero, vuelo, destino…';

    if (tabActual === 'config') { renderConfig(); renderStats(); return; }
    if (tabActual === 'calendario') { renderCalendario(); renderStats(); return; }
    if (tabActual === 'pasajeros') { renderPasajerosTab(); renderStats(); return; }

    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    let lista = Object.entries(traslados);

    if (tabActual === 'proximos') {
      // Pendientes de hoy en adelante (incluye los de hoy aunque ya haya pasado la hora)
      lista = lista.filter(([,t]) => t.estado === 'pendiente' && diffDias(t.fecha) >= 0);
    }
    // tabActual === 'todos' -> sin filtro adicional, muestra pendientes/completados/cancelados

    if (q) {
      lista = lista.filter(([,t]) => {
        const blob = [paxNombresLive(t),t.vuelo,t.origen,t.destino,t.notas].join(' ').toLowerCase();
        return blob.includes(q);
      });
    }

    lista.sort(([,a],[,b]) => (a.fecha+a.hora).localeCompare(b.fecha+b.hora));

    document.getElementById('mainContent').innerHTML = renderLista(lista);
    renderStats();
  }

  function tab_visible(tab) { return (tab === 'config') ? 'none' : ''; }

  // ── Pestaña de Pasajeros ─────────────────────────────────────────────────
  function renderPasajerosTab() {
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    let lista = Object.entries(pasajerosDB);
    if (q) {
      lista = lista.filter(([,p]) => (p.nombre||'').toLowerCase().includes(q) || (p.telefono||'').includes(q));
    }
    lista.sort(([,a],[,b]) => (a.nombre||'').localeCompare(b.nombre||''));

    if (lista.length === 0) {
      document.getElementById('mainContent').innerHTML = `<div class="empty"><div class="icon">👤</div><p>No hay pasajeros registrados aún</p></div>`;
      return;
    }

    document.getElementById('mainContent').innerHTML = `<div class="trip-list">${
      lista.map(([id,p],i) => {
        const iniciales = (p.nombre||'?').trim().split(/\s+/).slice(0,2).map(s=>s[0]).join('').toUpperCase();
        const nViajes = Object.values(traslados).filter(t => (t.paxIds||[]).includes(id)).length;
        const tel = soloDigitos(p.telefono);
        return `<div class="pax-card" style="animation-delay:${i*0.03}s">
          <div class="pax-avatar" onclick="abrirDetallePasajero('${id}')">${iniciales}</div>
          <div class="pax-card-info" onclick="abrirDetallePasajero('${id}')">
            <div class="pax-card-name">${escapeHtml(p.nombre||'Sin nombre')}</div>
            ${p.telefono ? `<div class="pax-card-meta">📱 ${escapeHtml(p.telefono)}</div>` : ''}
            ${p.pais ? `<div class="pax-card-meta">🌎 ${escapeHtml(p.pais)}</div>` : ''}
            <div class="pax-card-trips">${nViajes} viaje${nViajes===1?'':'s'}</div>
          </div>
          ${tel ? `<a href="https://wa.me/${tel}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:rgba(0,230,118,.15);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:1.1rem;">📱</a>` : ''}
        </div>`;
      }).join('')
    }</div>`;
  }

  window.abrirDetallePasajero = function(id) {
    idActual = id;
    const p = pasajerosDB[id];
    const nViajes = Object.values(traslados).filter(t => (t.paxIds||[]).includes(id)).length;
    const tel = soloDigitos(p.telefono);
    document.getElementById('paxDetailBody').innerHTML = `
      <div class="detail-row"><span>Nombre</span><span>${escapeHtml(p.nombre||'—')}</span></div>
      <div class="detail-row"><span>Celular</span><span>${escapeHtml(p.telefono||'—')}</span></div>
      <div class="detail-row"><span>País de origen</span><span>${escapeHtml(p.pais||'—')}</span></div>
      ${p.notas ? `<div class="detail-row"><span>Notas</span><span>${escapeHtml(p.notas)}</span></div>` : ''}
      <div class="detail-row"><span>Viajes registrados</span><span>${nViajes}</span></div>
    `;
    const waBtn = document.getElementById('paxWhatsappBtn');
    if (tel) {
      waBtn.style.display = '';
      waBtn.onclick = () => window.open(`https://wa.me/${tel}`, '_blank');
    } else {
      waBtn.style.display = 'none';
    }
    abrirModal('paxDetailModal');
  };

  window.editarPasajeroPerfil = function() {
    const p = pasajerosDB[idActual];
    cerrarModal('paxDetailModal');
    setTimeout(() => {
      document.getElementById('paxFormTitle').textContent = 'Editar Pasajero';
      document.getElementById('inputPaxNombre').value   = p.nombre || '';
      document.getElementById('inputPaxTelefono').value = p.telefono || '';
      document.getElementById('inputPaxPais').value     = p.pais || '';
      document.getElementById('inputPaxNotas').value    = p.notas || '';
      abrirModal('paxModal');
    }, 250);
  };

  window.guardarPasajeroPerfil = async function() {
    const nombre = document.getElementById('inputPaxNombre').value.trim();
    if (!nombre) { toast('Escribe el nombre del pasajero', 'error'); return; }
    const data = {
      nombre,
      telefono: document.getElementById('inputPaxTelefono').value.trim(),
      pais:     document.getElementById('inputPaxPais').value.trim(),
      notas:    document.getElementById('inputPaxNotas').value.trim(),
    };
    try {
      if (idActual && pasajerosDB[idActual] && document.getElementById('paxFormTitle').textContent === 'Editar Pasajero') {
        await updateDoc(doc(db,'pasajeros',idActual), data);
        toast('✅ Pasajero actualizado', 'success');
      } else {
        await addDoc(collection(db,'pasajeros'), data);
        toast('✅ Pasajero agregado', 'success');
      }
      cerrarModal('paxModal');
    } catch(e) {
      console.error(e);
      toast('❌ Error al guardar pasajero', 'error');
    }
  };

  window.eliminarPasajeroPerfil = async function() {
    const nViajes = Object.values(traslados).filter(t => (t.paxIds||[]).includes(idActual)).length;
    const msg = nViajes > 0
      ? `Este pasajero tiene ${nViajes} viaje(s) registrado(s). Se eliminará su perfil pero los viajes quedarán con el nombre guardado. ¿Continuar?`
      : '¿Eliminar este pasajero?';
    if (!confirm(msg)) return;
    await deleteDoc(doc(db,'pasajeros',idActual));
    cerrarModal('paxDetailModal');
    toast('🗑️ Pasajero eliminado', 'error');
  };


  function renderLista(lista) {
    if (lista.length === 0) {
      return `<div class="empty"><div class="icon">🧳</div><p>No hay traslados aquí</p></div>`;
    }
    return `<div class="trip-list">${lista.map(([id,t],i) => tripCardHTML(id,t,i)).join('')}</div>`;
  }

  function tripCardHTML(id, t, i) {
    const u = urgency(t);
    const { dia, mes } = fmtFechaCorta(t.fecha);
    const tipo = TIPOS[t.tipo] || TIPOS.otro;
    return `<div class="trip-card ${u}" style="animation-delay:${i*0.03}s" onclick="abrirDetalle('${id}')">
      <div class="trip-icon">${tipo.icon}</div>
      <div class="trip-info">
        <div class="trip-pax">${escapeHtml(paxNombresLive(t) || 'Sin nombre')}</div>
        <div class="trip-ruta">${escapeHtml(t.origen||'')} → ${escapeHtml(t.destino||'')}</div>
        ${t.vuelo ? `<div class="trip-vuelo">✈️ Vuelo ${escapeHtml(t.vuelo)}</div>` : ''}
        <span class="badge ${u}">${badgeText(u)}</span>
      </div>
      <div class="trip-fecha">
        <div class="dia">${dia} ${mes}</div>
        <div class="hora">${fmtHora12(t.hora)}</div>
      </div>
    </div>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // Nombres de pasajeros de un viaje, siempre actualizados según su perfil actual
  function paxNombresLive(t) {
    if (t.paxIds && t.paxIds.length) {
      const nombres = t.paxIds.map(id => pasajerosDB[id]?.nombre).filter(Boolean);
      if (nombres.length) return nombres.join(', ');
    }
    return t.pasajerosNombres || '';
  }

  // Solo dígitos, para armar enlaces wa.me (WhatsApp)
  function soloDigitos(tel) { return (tel||'').replace(/[^0-9]/g, ''); }

  // ── Stats ─────────────────────────────────────────────────────────────────
  function renderStats() {
    const total = Object.keys(traslados).length;
    const hoyN  = Object.values(traslados).filter(t => t.estado==='pendiente' && diffDias(t.fecha)===0).length;
    const semN  = Object.values(traslados).filter(t => t.estado==='pendiente' && diffDias(t.fecha)>=0 && diffDias(t.fecha)<=7).length;
    document.getElementById('statsBox').innerHTML = `
      <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${hoyN}</div><div class="stat-label">Hoy</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--warn)">${semN}</div><div class="stat-label">Esta semana</div></div>
    `;
  }

  // ── Calendario ────────────────────────────────────────────────────────────
  function renderCalendario() {
    const primerDia = new Date(calAnio, calMes, 1);
    const inicioSemana = primerDia.getDay();
    const diasEnMes = new Date(calAnio, calMes+1, 0).getDate();
    const hoy = hoyISO();

    const porDia = {};
    Object.entries(traslados).forEach(([id,t]) => {
      if (t.estado !== 'pendiente') return;
      (porDia[t.fecha] ||= []).push([id,t]);
    });

    let celdas = '';
    for (let i=0;i<inicioSemana;i++) celdas += `<div class="cal-day empty"></div>`;
    for (let d=1; d<=diasEnMes; d++) {
      const iso = `${calAnio}-${String(calMes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const n = (porDia[iso]||[]).length;
      const cls = ['cal-day'];
      if (iso === hoy) cls.push('today');
      if (iso === diaSeleccionado) cls.push('selected');
      celdas += `<div class="${cls.join(' ')}" onclick="seleccionarDia('${iso}')">
        <div class="n">${d}</div>
        ${n ? `<div class="dots">${Array.from({length:Math.min(n,3)}).map(()=>'<span></span>').join('')}</div>` : ''}
      </div>`;
    }

    let listaDia = '';
    if (diaSeleccionado) {
      const items = (porDia[diaSeleccionado]||[]).sort((a,b)=>a[1].hora.localeCompare(b[1].hora));
      const [y,m,d] = diaSeleccionado.split('-').map(Number);
      const titulo = `${d} de ${MESES_L[m-1]}`;
      listaDia = `<div class="cal-daylist-title">Traslados — ${titulo}</div>${renderLista(items)}`;
    } else {
      listaDia = `<div class="empty"><div class="icon">📅</div><p>Toca un día para ver sus traslados</p></div>`;
    }

    document.getElementById('mainContent').innerHTML = `
      <div class="cal-header">
        <button onclick="cambiarMes(-1)">‹</button>
        <div class="cal-title">${MESES_L[calMes]} ${calAnio}</div>
        <button onclick="cambiarMes(1)">›</button>
      </div>
      <div class="cal-grid">
        ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${celdas}
      </div>
      ${listaDia}
    `;
  }

  window.cambiarMes = function(delta) {
    calMes += delta;
    if (calMes < 0) { calMes = 11; calAnio--; }
    if (calMes > 11) { calMes = 0; calAnio++; }
    renderCalendario();
  };
  window.seleccionarDia = function(iso) {
    diaSeleccionado = (diaSeleccionado === iso) ? null : iso;
    renderCalendario();
  };

  // ── Config ────────────────────────────────────────────────────────────────
  function renderConfig() {
    const total = Object.keys(traslados).length;
    document.getElementById('mainContent').innerHTML = `
      <div class="config-section">
        <h3>Estado del sistema</h3>
        <div class="info-row"><span>Traslados registrados</span><span>${total}</span></div>
        <div class="info-row"><span>Base de datos</span><span>Firebase Firestore</span></div>
        <div class="info-row"><span>Sincronización</span><span>Tiempo real</span></div>
      </div>
      <div class="config-section">
        <h3>Instalar como app</h3>
        <div class="info-row"><span>Android</span><span>Menú ⋮ → Instalar app</span></div>
        <div class="info-row"><span>iPhone</span><span>Compartir → Pantalla inicio</span></div>
      </div>
    `;
  }

  // ── Tabs ──────────────────────────────────────────────────────────────────
  window.switchTab = function(tab, btn) {
    tabActual = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTab();
  };

  // ── Detalle ───────────────────────────────────────────────────────────────
  window.abrirDetalle = function(id) {
    idActual = id;
    const t = traslados[id];
    const u = urgency(t);
    const tipo = TIPOS[t.tipo] || TIPOS.otro;
    const paxDetalle = (t.paxIds||[]).map(pid => {
      const p = pasajerosDB[pid];
      if (!p) return null;
      const tel = soloDigitos(p.telefono);
      const waLink = tel ? `<a href="https://wa.me/${tel}" target="_blank" rel="noopener" style="color:var(--ok);text-decoration:none;">📱 WhatsApp</a>` : '';
      return `<div>${escapeHtml(p.nombre)}${p.telefono ? ' · '+escapeHtml(p.telefono) : ''}${waLink ? ' · '+waLink : ''}</div>`;
    }).filter(Boolean).join('') || escapeHtml(paxNombresLive(t) || '—');

    document.getElementById('detailBody').innerHTML = `
      <div class="detail-row"><span>Pasajero(s)</span><span>${paxDetalle}</span></div>
      <div class="detail-row"><span>Tipo</span><span>${tipo.icon} ${tipo.label}</span></div>
      <div class="detail-row"><span>Fecha</span><span>${t.fecha} · ${fmtHora12(t.hora)||'--:--'}</span></div>
      ${t.vuelo ? `<div class="detail-row"><span>Vuelo</span><span>${escapeHtml(t.vuelo)}</span></div>` : ''}
      <div class="detail-row"><span>Origen</span><span>${escapeHtml(t.origen||'—')}</span></div>
      <div class="detail-row"><span>Destino</span><span>${escapeHtml(t.destino||'—')}</span></div>
      <div class="detail-row"><span>Estado</span><span><span class="badge ${u}">${badgeText(u)}</span></span></div>
      ${t.notas ? `<div class="detail-row"><span>Notas</span><span>${escapeHtml(t.notas)}</span></div>` : ''}
    `;

    const statusRow = document.getElementById('detailStatusRow');
    if (t.estado === 'pendiente') {
      statusRow.innerHTML = `
        <button class="btn btn-ghost" onclick="cambiarEstado('cancelado')">Cancelar viaje</button>
        <button class="btn btn-warn" onclick="cambiarEstado('completado')">Marcar completado</button>`;
    } else {
      statusRow.innerHTML = `<button class="btn btn-ghost" onclick="cambiarEstado('pendiente')">Volver a pendiente</button>`;
    }

    abrirModal('detailModal');
  };

  window.cambiarEstado = async function(nuevoEstado) {
    try {
      await updateDoc(doc(db,'traslados',idActual), { estado: nuevoEstado });
      toast(nuevoEstado === 'completado' ? '✅ Marcado como completado' : nuevoEstado === 'cancelado' ? '🚫 Viaje cancelado' : '↩️ Vuelto a pendiente', 'success');
      cerrarModal('detailModal');
    } catch(e) {
      console.error(e);
      toast('❌ Error al actualizar', 'error');
    }
  };

  // ── Pasajeros: buscar / seleccionar / crear ──────────────────────────────
  window.buscarPasajeros = function(q) {
    const box = document.getElementById('paxSuggestions');
    q = (q||'').trim().toLowerCase();
    const candidatos = Object.entries(pasajerosDB)
      .filter(([id]) => !selectedPax.includes(id))
      .filter(([,p]) => !q || p.nombre.toLowerCase().includes(q) || (p.telefono||'').includes(q));

    let html = candidatos.slice(0,6).map(([id,p]) =>
      `<div class="pax-sugg-item" onclick="seleccionarPasajero('${id}')">
        <span>${escapeHtml(p.nombre)}</span>
        <span class="tel">${escapeHtml(p.telefono||'')}</span>
      </div>`
    ).join('');

    if (q && !Object.values(pasajerosDB).some(p => p.nombre.toLowerCase() === q)) {
      html += `<div class="pax-sugg-new" onclick="crearPasajeroDesdeInput()">+ Crear pasajero "${escapeHtml(q)}"</div>`;
    }

    box.innerHTML = html;
    box.classList.toggle('show', html.length > 0);
  };

  window.crearPasajeroDesdeInput = async function() {
    const input = document.getElementById('inputPaxSearch');
    const nombre = input.value.trim();
    if (!nombre) return;
    try {
      const ref = await addDoc(collection(db,'pasajeros'), { nombre, telefono: '', pais: '' });
      pasajerosDB[ref.id] = { nombre, telefono: '', pais: '' };
      seleccionarPasajero(ref.id);
    } catch(e) {
      console.error(e);
      toast('❌ Error al crear pasajero', 'error');
    }
  };

  window.seleccionarPasajero = function(id) {
    if (!selectedPax.includes(id)) selectedPax.push(id);
    document.getElementById('inputPaxSearch').value = '';
    document.getElementById('paxSuggestions').classList.remove('show');
    renderPaxChips();
  };

  window.quitarPax = function(id) {
    selectedPax = selectedPax.filter(x => x !== id);
    renderPaxChips();
  };

  function renderPaxChips() {
    document.getElementById('paxChips').innerHTML = selectedPax.map(id => {
      const p = pasajerosDB[id];
      if (!p) return '';
      return `<div class="pax-chip">${escapeHtml(p.nombre)}<button onclick="quitarPax('${id}')">✕</button></div>`;
    }).join('');
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('.pax-search')) document.getElementById('paxSuggestions').classList.remove('show');
  });

  // ── Guardar (crear o editar) ─────────────────────────────────────────────
  window.guardarTraslado = async function() {
    if (selectedPax.length === 0) { toast('Agrega al menos un pasajero', 'error'); return; }
    const pasajerosNombres = selectedPax.map(id => pasajerosDB[id]?.nombre).filter(Boolean).join(', ');
    const data = {
      paxIds:     selectedPax,
      pasajerosNombres,
      tipo:       document.getElementById('inputTipo').value,
      vuelo:      document.getElementById('inputVuelo').value.trim(),
      fecha:      document.getElementById('inputFecha').value,
      hora:       getHora24DesdeSelects(),
      origen:     document.getElementById('inputOrigen').value.trim(),
      destino:    document.getElementById('inputDestino').value.trim(),
      notas:      document.getElementById('inputNotas').value.trim(),
    };
    if (!modoEdicion) data.estado = 'pendiente';
    if (!data.fecha || !data.hora || !data.origen || !data.destino) {
      toast('Completa fecha, hora, origen y destino', 'error'); return;
    }
    try {
      if (modoEdicion && idActual) {
        await updateDoc(doc(db,'traslados',idActual), data);
        toast('✅ Traslado actualizado', 'success');
      } else {
        await addDoc(collection(db,'traslados'), data);
        toast('✅ Traslado agregado', 'success');
      }
      cerrarModal('formModal');
    } catch (e) {
      console.error(e);
      toast('❌ Error al guardar', 'error');
    }
  };

  window.editarTraslado = function() {
    const t = traslados[idActual];
    modoEdicion = true;
    cerrarModal('detailModal');
    setTimeout(() => {
      document.getElementById('formTitle').textContent = 'Editar Traslado';
      selectedPax = [...(t.paxIds || [])];
      renderPaxChips();
      document.getElementById('inputTipo').value      = t.tipo || 'aeropuerto-hotel';
      document.getElementById('inputVuelo').value     = t.vuelo || '';
      document.getElementById('inputFecha').value     = t.fecha || '';
      setHoraSelects(t.hora || '');
      document.getElementById('inputOrigen').value    = t.origen || '';
      document.getElementById('inputDestino').value   = t.destino || '';
      document.getElementById('inputNotas').value     = t.notas || '';
      abrirModal('formModal');
    }, 250);
  };

  window.eliminarTraslado = async function() {
    if (!confirm('¿Eliminar este traslado?')) return;
    await deleteDoc(doc(db,'traslados',idActual));
    cerrarModal('detailModal');
    toast('🗑️ Traslado eliminado', 'error');
  };

  function limpiarForm() {
    ['inputVuelo','inputFecha','inputOrigen','inputDestino','inputNotas','inputPaxSearch']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('inputTipo').value = 'aeropuerto-hotel';
    setHoraSelects('');
    document.getElementById('formTitle').textContent = 'Nuevo Traslado';
    selectedPax = [];
    renderPaxChips();
    modoEdicion = false;
    idActual = null;
  }

  // ── Modal helpers ─────────────────────────────────────────────────────────
  window.abrirModal  = id => document.getElementById(id).classList.add('open');
  window.cerrarModal = id => { document.getElementById(id).classList.remove('open'); if (id==='formModal') limpiarForm(); };

  document.querySelectorAll('.modal-overlay').forEach(o =>
    o.addEventListener('click', e => { if (e.target === o) cerrarModal(o.id); })
  );

  document.getElementById('fabBtn').onclick = () => {
    if (tabActual === 'pasajeros') {
      document.getElementById('paxFormTitle').textContent = 'Nuevo Pasajero';
      ['inputPaxNombre','inputPaxTelefono','inputPaxPais','inputPaxNotas'].forEach(id => document.getElementById(id).value = '');
      idActual = null;
      abrirModal('paxModal');
    } else {
      limpiarForm();
      document.getElementById('inputFecha').value = hoyISO();
      abrirModal('formModal');
    }
  };

  // ── Toast ─────────────────────────────────────────────────────────────────
  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent  = msg;
    t.className    = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
